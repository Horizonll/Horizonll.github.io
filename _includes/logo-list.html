<ul>
  {% for item in include.items %}
  <li class="logo-item">
    {% if item.icon %}
    <img
      class="logo-icon"
      src="{{ item.icon | relative_url }}"
      width="60"
      height="60"
      alt=""
      aria-hidden="true"
      loading="lazy"
      decoding="async"
    />
    {% endif %}
    <span>{{ item.period }}<br />{{ item.text }}</span>
  </li>
  {% endfor %}
</ul>
